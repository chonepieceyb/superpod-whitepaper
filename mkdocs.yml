site_name: 超节点技术白皮书
site_description: 面向下一代模型的 AI 超节点技术白皮书
site_url: https://deeplink.org/superpod-whitepaper/
docs_dir: src

repo_name: superpod-whitepaper
repo_url: https://github.com/DeepLink-org/superpod-whitepaper
edit_uri: edit/main/src/

theme:
  name: material
  custom_dir: overrides
  language: zh
  # 使用自托管字体（见 src/assets/fonts/ 与 custom.css 的 @font-face）
  # 关闭 Material 的在线字体加载，避免与自定义字体栈冲突
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - navigation.expand
    - toc.integrate
    - search.highlight
    - search.share
    - content.action.edit
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'
  - encryptcontent:
      global_password: 'superpod2026'
      reload_scripts:
        - javascripts/charts.js
      title_prefix: '🔒'
  - excalidraw
  - heti

hooks:
  - hooks/spi_registry.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.blocks.caption
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: vegalite
          class: vegalite
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 2-3

nav:
  - 首页: index.md
  - 前言: 
    - 00-preface.md
    - 编写委员会: 00-editorial-board.md
  - 架构分析:
    - 01-architecture/index.md
    - 产品实践:
      - NVIDIA 超节点: 01-architecture/01-nvidia.md
      - 华为超节点: 01-architecture/02-huawei.md
    - 技术基础:
      - 电气接口与物理层: 01-architecture/03-electrical.md
      - 互联协议与内存语义: 01-architecture/04-protocols.md
      - 互联拓扑与扩展权衡: 01-architecture/05-topology.md
    - 系统实现:
      - 统一访存与系统架构: 01-architecture/06-system-architecture.md
      - 整机工程与交付形态: 01-architecture/07-server-architecture.md
  - 软件系统:
    - 本章导读: 02-software/index.md
    - 统一内存子系统:
      - 通用语义框架：内存语义、保序与地址翻译: 02-software/hw-memory-foundations.md
      - 实现剖面：NVIDIA 统一寻址与跨节点访问: 02-software/memory-semantics.md
      - 内存池化：从可访问到高效调度: 02-software/memory-pooling.md
    - 训推系统与通信调度:
      - 通信运行时与编程模型: 02-software/comm-lib.md
      - 可观测性与 RAS 体系: 02-software/ras.md
      - 训练与推理系统工程: 02-software/train-infer.md
  - 建模仿真:
    - 03-simulation/index.md
    - 负载模型：定义需求侧的压力画像: 03-simulation/2.workload_modeling.md
    - 系统模型：映射与编排的推演引擎: 03-simulation/3.system_simulation.md
    - 校准验证与共演进闭环: 03-simulation/coevolution.md
    - 方法论落地：异构推理架构的帕累托分析: 03-simulation/case-inference.md
  - 参考设计:
    - 本章导读: 04-reference-designs/index.md
    - 标准构型：总线全对等互联方案: 04-reference-designs/standard-bus.md
    - 标准构型：以太全对等互联方案: 04-reference-designs/standard-ether.md
    - 探索构型：Dragonfly + OCS 方案: 04-reference-designs/dragonfly-ocs.md
    - 探索构型：3D Torus + OCS 方案: 04-reference-designs/torus-ocs.md
    - 探索构型：大环路 + 分布式 dOCS 方案: 04-reference-designs/ring-docs.md
  - 未来演进:
    - 本章导读: 05-future/index.md
    - 互联技术演进:
      - 光互联与交换: 05-future/interconnect.md
      - 先进互联拓扑演进: 05-future/topology.md
      - Scale-Up 总线与互联语义: 05-future/bus.md
    - 先进封装技术演进:
      - 光电互连封装（LPO/NPO/CPO）: 05-future/packaging.md
      - Chiplet 多Die 集成（2.5D/3D）: 05-future/chiplet.md
      - 堆叠内存技术（HBM/3D DRAM）: 05-future/hbm.md
    - 先进模型技术演进:
      - 模型技术演进总览: 05-future/model-tech.md
      - 低精度数值格式: 05-future/low-precision.md
      - 超长序列技术: 05-future/long-context.md
      - 超稀疏模型技术: 05-future/ultra-sparse.md
      - 多模态融合技术: 05-future/multimodal.md
  - 产业协同与 SPI 筹备:
    - SuperPod Pareto Index (SPI) 筹备说明书: 07-spi.md
    - SPI 现有收录产品名录: 07-spi-registry.md
    - 产业生态地图: 08-ecosystem-map.md
  - 结语与附录:
    - 总结: 06-conclusion.md
    - 证据等级与判断口径: 07-evidence-grading.md
    - 附录: 07-appendix.md
  - 版本历史: 00-version-history.md
  - 参与方式:
    - 如何参与: contributing.md
    - 为何参与: contributing/industry-participation.md


