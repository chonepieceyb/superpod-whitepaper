site_name: 超节点技术白皮书
site_description: 面向下一代模型的 AI 超节点技术白皮书
site_url: https://deeplink.org/superpod-whitepaper/
docs_dir: src

repo_name: superpod-whitepaper
repo_url: https://github.com/DeepLink-org/superpod-whitepaper

theme:
  name: material
  custom_dir: overrides
  language: zh
  # 使用自托管字体（见 src/assets/fonts/ 与 custom.css 的 @font-face）
  # 关闭 Material 的在线字体加载，避免与自定义字体栈冲突
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'
  - encryptcontent:
      global_password: 'superpod2026'
      reload_scripts:
        - javascripts/charts.js
      # title_prefix: '🔒'
  #     summary: '此页面内容已加密，请输入密码查看。'
  #     placeholder: '请输入密码'
  #     decryption_failure_message: '密码错误，请重试。'
  #     encryption_info_message: '请联系管理员获取访问密码。'
  #     password_button: true
  #     password_button_text: '解锁'
  #     remember_password: true
  #     session_storage: true
  #     webcrypto: true
  #     selfhost: true
  #     selfhost_download: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.blocks.caption
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: vegalite
          class: vegalite
          format: !!python/name:mkdocs_charts_plugin.fences.fence_vegalite
        - name: plotly
          class: mkdocs-plotly
          format: !!python/name:mkdocs_plotly_plugin.fences.fence_plotly
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - 首页: index.md
  - 架构分析:
    - 01-architecture/index.md
    - 产品实践:
      - NVIDIA 超节点: 01-architecture/nvidia.md
      - 华为超节点: 01-architecture/huawei.md
    - 技术基础:
      - 电气接口（物理层）: 01-architecture/electrical.md
      - 互联协议（链路/事务层）: 01-architecture/protocols.md
      - 互联拓扑（网络层）: 01-architecture/topology.md
    - 系统实现:
      - 系统架构: 01-architecture/system-architecture.md
      - 整机工程: 01-architecture/server-architecture.md
  - 软件系统:
    - 02-software/index.md
    - 内存语义: 02-software/memory-semantics.md
    - 通信库: 02-software/comm-lib.md
    - RAS 可靠性: 02-software/ras.md
    - 训练与推理: 02-software/train-infer.md
  - 建模仿真:
    - 03-simulation/index.md
    - 仿真平台: 03-simulation/platform.md
    - 软硬协同演进: 03-simulation/coevolution.md
  - 参考设计:
    - 04-reference-designs/index.md
    - 标准以太网方案: 04-reference-designs/standard-ether.md
    - 标准总线方案: 04-reference-designs/standard-bus.md
    - Dragonfly OCS: 04-reference-designs/dragonfly-ocs.md
    - Torus OCS: 04-reference-designs/torus-ocs.md
    - Ring 文档: 04-reference-designs/ring-docs.md
  - 未来演进:
    - 05-future/index.md
    - 光互联: 05-future/interconnect.md
    - 先进封装: 05-future/packaging.md
    - 模型技术: 05-future/model-tech.md
  - 总结: 06-conclusion.md
  - 附录: 07-appendix.md

extra:
  partners:
    - name: 上海人工智能实验室
    - name: 中国联通
    - name: 阶跃星辰
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DeepLink-org/superpod-whitepaper

extra_css:
  - assets/stylesheets/custom.css
  - assets/stylesheets/home.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/vega@5
  - https://cdn.jsdelivr.net/npm/vega-lite@5
  - https://cdn.jsdelivr.net/npm/vega-embed@6
  - javascripts/charts.js

